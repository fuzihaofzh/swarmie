<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>

  <!--
    6 flat-top hexagons in a ring with small gap.
    r = 80, gap = 6 (centers pushed out by 6px)
    Center distance = r*sqrt(3) + 6 ≈ 144.56
    Ring at angles 30°,90°,150°,210°,270°,330°

    Centers (with gap=6 outward offset):
      Top:         (256, 111.4)    — shifted up 6
      Upper-right: (381.2, 183.7)  — shifted right 5.2, up 3
      Lower-right: (381.2, 328.3)  — shifted right 5.2, down 3
      Bottom:      (256, 400.6)    — shifted down 6
      Lower-left:  (130.8, 328.3)  — shifted left 5.2, down 3
      Upper-left:  (130.8, 183.7)  — shifted left 5.2, up 3
  -->

  <!-- Top (256, 111.4) -->
  <polygon points="336,111.4 296,180.7 216,180.7 176,111.4 216,42.1 296,42.1" fill="url(#g1)"/>

  <!-- Upper-right (381.2, 183.7) -->
  <polygon points="461.2,183.7 421.2,253 341.2,253 301.2,183.7 341.2,114.4 421.2,114.4" fill="url(#g2)"/>

  <!-- Lower-right (381.2, 328.3) -->
  <polygon points="461.2,328.3 421.2,397.6 341.2,397.6 301.2,328.3 341.2,259 421.2,259" fill="url(#g3)"/>

  <!-- Bottom (256, 400.6) -->
  <polygon points="336,400.6 296,469.9 216,469.9 176,400.6 216,331.3 296,331.3" fill="url(#g4)"/>

  <!-- Lower-left (130.8, 328.3) -->
  <polygon points="210.8,328.3 170.8,397.6 90.8,397.6 50.8,328.3 90.8,259 170.8,259" fill="url(#g5)"/>

  <!-- Upper-left (130.8, 183.7) -->
  <polygon points="210.8,183.7 170.8,253 90.8,253 50.8,183.7 90.8,114.4 170.8,114.4" fill="url(#g6)"/>
</svg>
