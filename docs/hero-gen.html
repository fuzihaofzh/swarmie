<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px;
  height: 640px;
  background: #0d1117;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  height: 100%;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
}

/* Subtle grid background */
.container::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(88, 166, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(88, 166, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Glow */
.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.12;
}
.glow-1 { background: #58a6ff; top: -150px; left: 100px; }
.glow-2 { background: #a371f7; bottom: -150px; right: 100px; }

.top-section {
  position: relative;
  z-index: 1;
  text-align: center;
}

.title {
  font-size: 56px;
  font-weight: 800;
  letter-spacing: -2px;
  color: #f0f6fc;
}

.tagline {
  font-size: 18px;
  color: #8b949e;
  font-weight: 400;
  margin-top: 8px;
  line-height: 1.5;
}

.tagline em {
  font-style: normal;
  color: #58a6ff;
}

/* Screenshot mockup with browser chrome */
.browser-frame {
  width: 1060px;
  height: 420px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  z-index: 1;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
}

.browser-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top left;
  display: block;
}
</style>
</head>
<body>
<div class="container">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="top-section">
    <div class="title">swarmie</div>
    <div class="tagline">
      All your AI coding agents, from <em>all your machines</em>, in one browser tab.
    </div>
  </div>

  <div class="browser-frame">
    <img src="screenshot-dark.png" />
  </div>
</div>
</body>
</html>
