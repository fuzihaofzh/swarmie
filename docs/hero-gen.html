<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px;
  height: 640px;
  background: #0d1117;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  height: 100%;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
}

.container::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(88, 166, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(88, 166, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.12;
}
.glow-1 { background: #58a6ff; top: -150px; left: 100px; }
.glow-2 { background: #a371f7; bottom: -150px; right: 100px; }

.top-section {
  position: relative;
  z-index: 1;
  text-align: center;
}

.title {
  font-size: 56px;
  font-weight: 800;
  letter-spacing: -2px;
  color: #f0f6fc;
}

.tagline {
  font-size: 18px;
  color: #8b949e;
  font-weight: 400;
  margin-top: 8px;
  line-height: 1.5;
}

.tagline em {
  font-style: normal;
  color: #58a6ff;
}

/* Browser frame */
.browser-frame {
  width: 1060px;
  height: 440px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  z-index: 1;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
}

/* Custom tab bar overlay */
.tab-bar {
  height: 36px;
  min-height: 36px;
  background: #1c2128;
  border-bottom: 1px solid #30363d;
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

.menu-btn {
  display: flex;
  flex-direction: column;
  gap: 2.5px;
  padding: 6px 10px;
  margin-right: 4px;
}
.menu-btn span {
  width: 14px;
  height: 1.5px;
  background: #8b949e;
  border-radius: 1px;
}

.tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 16px;
  font-size: 12.5px;
  color: #8b949e;
  cursor: default;
  white-space: nowrap;
  border-right: 1px solid #30363d;
  height: 100%;
}
.tab.active {
  background: #161b22;
  color: #e6edf3;
}

.tab-icon {
  width: 15px;
  height: 15px;
  border-radius: 3px;
  display: inline-block;
  flex-shrink: 0;
}
.tab-icon.claude { background: #e8754a; }
.tab-icon.codex { background: #10a37f; }
.tab-icon.shell { background: #8b949e; }

.tab-close {
  font-size: 14px;
  color: #484f58;
  margin-left: 4px;
}
.tab.active .tab-close { color: #8b949e; }

.tab-badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.badge-remote {
  background: #1f6feb33;
  color: #58a6ff;
}

.new-tab {
  color: #484f58;
  font-size: 18px;
  padding: 0 12px;
  margin-left: auto;
  line-height: 1;
}

/* Screenshot area */
.screenshot-area {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.screenshot-area img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  /* Crop out the original tab bar from the screenshot */
  object-position: 0 -36px;
  display: block;
}
</style>
</head>
<body>
<div class="container">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="top-section">
    <div class="title">swarmie</div>
    <div class="tagline">
      All your AI coding agents, from <em>all your machines</em>, in one browser tab.
    </div>
  </div>

  <div class="browser-frame">
    <div class="tab-bar">
      <div class="menu-btn"><span></span><span></span><span></span></div>
      <div class="tab active">
        <span class="tab-icon claude"></span>
        ~/workbench
        <span class="tab-close">&times;</span>
      </div>
      <div class="tab">
        <span class="tab-icon codex"></span>
        ~/api
        <span class="tab-close">&times;</span>
      </div>
      <div class="tab">
        <span class="tab-icon shell"></span>
        <span class="tab-badge badge-remote">REMOTE</span>
        ~/task
        <span class="tab-close">&times;</span>
      </div>
      <div class="new-tab">+</div>
    </div>
    <div class="screenshot-area">
      <img src="screenshot-dark.png" />
    </div>
  </div>
</div>
</body>
</html>
